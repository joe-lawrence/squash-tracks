<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="color-scheme" content="dark light" />
  <title>Workout player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/player.css" />
  <link rel="stylesheet" href="css/player-themes.css" />
  <script>
    (function () {
      try {
        var prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = localStorage.getItem("theme") || (prefersDark ? "dark" : "light");
        if (theme !== "light" && theme !== "dark") theme = prefersDark ? "dark" : "light";
        var darkScheme = localStorage.getItem("darkScheme") || "blue-ocean";
        var lightScheme = localStorage.getItem("lightScheme") || "cloud-silver";
        var scheme = theme === "dark" ? darkScheme : lightScheme;
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.setAttribute("data-color-scheme", scheme);
      } catch (_) {}
    })();
  </script>
</head>
<body class="player-page">
  <div class="player-sr-file-host">
    <input
      type="file"
      id="playerFileInput"
      class="player-file-input"
      accept="application/json,.json"
      aria-label="Open workout JSON file"
    />
  </div>
  <div id="playerStatus" class="player-status" role="status" aria-live="polite"></div>

  <main class="player-main">
    <div class="presentation-device-shell">
      <div class="presentation-device-frame" id="presDeviceFrame">
        <div class="presentation-device-screen">
          <div class="presentation-vfx-overlay" id="presVfxOverlay" hidden aria-hidden="true"></div>
          <canvas class="presentation-vfx-sparks-canvas" id="presVfxSparksCanvas" hidden aria-hidden="true"></canvas>
          <div class="presentation-manual-rep-gate" id="presManualRepGate" hidden aria-hidden="true">
            <div class="presentation-manual-rep-gate__shade" aria-hidden="true"></div>
            <button
              type="button"
              class="presentation-manual-rep-gate__btn"
              id="presManualRepGateBtn"
              aria-label="Tap circle to continue workout"
              title="Continue"
            >
              <span class="pres-manual-gate-icon-slot" aria-hidden="true">
                <!-- Lucide circle — https://lucide.dev/icons/circle (ISC) -->
                <svg
                  class="pres-manual-gate-svg pres-manual-gate-svg--idle"
                  xmlns="http://www.w3.org/2000/svg"
                  width="96"
                  height="96"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.35"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="10" />
                </svg>
                <!-- Lucide circle-check-big — https://lucide.dev/icons/circle-check-big (ISC) -->
                <svg
                  class="pres-manual-gate-svg pres-manual-gate-svg--ack"
                  xmlns="http://www.w3.org/2000/svg"
                  width="96"
                  height="96"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.35"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21.801 10A10 10 0 1 1 17 3.335" />
                  <path d="m9 11 3 3L22 4" />
                </svg>
              </span>
            </button>
          </div>
          <div class="presentation-panel-header">
            <div class="player-menu-anchor" id="playerMenuAnchor">
              <button
                type="button"
                class="pres-head-name pres-head-name-menu-btn"
                id="presWorkoutTitle"
                aria-expanded="false"
                aria-haspopup="true"
                aria-controls="playerMenuDropdown"
                title="Workout menu"
                aria-label="Open workout menu"
              >
                —
              </button>
              <div class="player-menu-dropdown" id="playerMenuDropdown" hidden>
              <div class="player-menu-panel" id="playerMenuPanel">
                <div id="playerMenuMainView" class="player-menu-view" role="group" aria-label="Menu">
                  <button
                    type="button"
                    class="player-menu-dd-btn"
                    id="playerMenuOpenBtn"
                    aria-expanded="false"
                    aria-controls="playerMenuDropdown"
                  >
                    <span class="player-menu-dd-btn-icon" aria-hidden="true">
                      <!-- Lucide folder-open — https://lucide.dev/icons/folder-open (ISC) -->
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"
                        />
                      </svg>
                    </span>
                    <span>Open</span>
                    <span class="player-menu-dd-chevron" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="m9 18 6-6-6-6" />
                      </svg>
                    </span>
                  </button>
                  <button
                    type="button"
                    class="player-menu-dd-btn"
                    id="playerMenuThemeBtn"
                    aria-expanded="false"
                    aria-controls="playerMenuDropdown"
                  >
                    <span class="player-menu-dd-btn-icon" aria-hidden="true">
                      <!-- Lucide palette — https://lucide.dev/icons/palette (ISC) -->
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8z"
                        />
                        <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                        <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                        <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                        <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
                      </svg>
                    </span>
                    <span>Theme</span>
                    <span class="player-menu-dd-chevron" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="m9 18 6-6-6-6" />
                      </svg>
                    </span>
                  </button>
                  <button
                    type="button"
                    class="player-menu-dd-btn"
                    id="playerMenuTtsBtn"
                    aria-expanded="false"
                    aria-controls="playerMenuDropdown"
                  >
                    <span class="player-menu-dd-btn-icon" aria-hidden="true">
                      <!-- Lucide message-circle — https://lucide.dev/icons/message-circle (ISC) -->
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"
                        />
                      </svg>
                    </span>
                    <span>Text-to-speech</span>
                    <span class="player-menu-dd-chevron" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="m9 18 6-6-6-6" />
                      </svg>
                    </span>
                  </button>
                  <button
                    type="button"
                    class="player-menu-dd-btn player-menu-audio-duck-btn"
                    id="playerMenuAudioDuckingBtn"
                    aria-pressed="false"
                    aria-label="Audio ducking"
                    title="Audio ducking"
                  >
                    <span class="player-menu-dd-btn-icon" aria-hidden="true">
                      <!-- Lucide audio-lines — https://lucide.dev/icons/audio-lines (ISC) -->
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M2 10v3" />
                        <path d="M6 6v11" />
                        <path d="M10 3v18" />
                        <path d="M14 8v7" />
                        <path d="M18 5v13" />
                        <path d="M22 10v3" />
                      </svg>
                    </span>
                    <span>Audio Ducking</span>
                  </button>
                  <a href="index.html" class="player-menu-dd-about" id="playerAboutLink">
                    <span class="player-menu-dd-about-icon" aria-hidden="true">
                      <!-- Lucide circle-question-mark — https://lucide.dev/icons/circle-question-mark (ISC) -->
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="12" cy="12" r="10" />
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                        <path d="M12 17h.01" />
                      </svg>
                    </span>
                    <span>About</span>
                  </a>
                </div>
                <div id="playerMenuTtsView" class="player-menu-view" hidden role="group" aria-label="Text-to-speech">
                  <div class="player-menu-back-row">
                    <button type="button" class="player-menu-back-btn" id="playerMenuTtsBackBtn" aria-label="Back to menu" title="Back">
                      <svg
                        class="player-menu-back-btn-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="m15 18-6-6 6-6" />
                      </svg>
                      <span class="player-menu-back-label">Back</span>
                    </button>
                  </div>
                  <div class="player-menu-tts-body">
                    <div class="player-menu-tts-table" role="presentation">
                      <div id="playerTtsVoiceList" class="player-menu-tts-rows" role="group" aria-label="TTS voices"></div>
                    </div>
                  </div>
                </div>
                <div id="playerMenuLoadView" class="player-menu-view" hidden role="group" aria-label="Load workout">
                  <div class="player-menu-back-row">
                    <button type="button" class="player-menu-back-btn" id="playerMenuLoadBackBtn" aria-label="Back to menu" title="Back">
                      <!-- Lucide chevron-left — https://lucide.dev/icons/chevron-left (ISC) -->
                      <svg
                        class="player-menu-back-btn-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="m15 18-6-6 6-6" />
                      </svg>
                      <span class="player-menu-back-label">Back</span>
                    </button>
                  </div>
                  <button type="button" class="player-load-submenu-item" id="playerLoadFileItem">
                    <span class="player-load-submenu-icon" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.25"
                      >
                        <path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4" />
                        <path d="M14 2v4a2 2 0 0 0 2 2h4M2 15h10m-3 3 3-3-3-3" />
                      </svg>
                    </span>
                    <span>Load from file</span>
                  </button>
                  <button type="button" class="player-load-submenu-item" id="playerLoadUrlItem">
                    <span class="player-load-submenu-icon" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                      </svg>
                    </span>
                    <span>Load from URL</span>
                  </button>
                  <button type="button" class="player-load-submenu-item" id="playerLoadPasteItem">
                    <span class="player-load-submenu-icon" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M11 14h10" />
                        <path d="M16 4h2a2 2 0 0 1 2 2v1.344" />
                        <path d="m17 18 4-4-4-4" />
                        <path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 1.793-1.113" />
                        <rect x="8" y="2" width="8" height="4" rx="1" />
                      </svg>
                    </span>
                    <span>Paste JSON</span>
                  </button>
                </div>
                <div id="playerMenuThemeView" class="player-menu-view" hidden role="group" aria-label="Theme">
                  <div class="player-menu-back-row">
                    <button type="button" class="player-menu-back-btn" id="playerMenuThemeBackBtn" aria-label="Back to menu" title="Back">
                      <svg
                        class="player-menu-back-btn-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="m15 18-6-6 6-6" />
                      </svg>
                      <span class="player-menu-back-label">Back</span>
                    </button>
                  </div>
                  <div id="playerThemeOptions" class="player-theme-options"></div>
                </div>
                <div id="playerMenuThemeSchemesView" class="player-menu-view" hidden role="group" aria-label="Choose color scheme">
                  <div class="player-menu-back-row">
                    <button type="button" class="player-menu-back-btn" id="playerMenuThemeSchemesBackBtn" aria-label="Back" title="Back">
                      <svg
                        class="player-menu-back-btn-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="m15 18-6-6 6-6" />
                      </svg>
                      <span class="player-menu-back-label">Back</span>
                    </button>
                  </div>
                  <div id="playerThemeSchemeOptions" class="player-theme-options"></div>
                </div>
              </div>
            </div>
            </div>
            <span class="pres-head-time" id="presTime" aria-live="polite">0.0s / 0.0s</span>
          </div>
          <div class="presentation-cue-wrap">
            <div class="presentation-cue-stack" aria-live="polite">
              <p class="presentation-cue-heading" id="presCueHeading" hidden></p>
              <p class="presentation-cue-body presentation-cue-placeholder" id="presCueBody">—</p>
            </div>
          </div>
          <div class="presentation-meta-row">
            <span class="presentation-part-info"><span id="presPartName">Part 1</span> (<span id="presPartCounter">1 / 1</span>)</span>
            <span class="presentation-rep-info"><span id="presRepName">Rep 1</span> (<span id="presRepCounter">1 / 1</span>)</span>
          </div>
          <div class="presentation-progress" id="presProgressBar" aria-hidden="true">
            <div class="presentation-progress-fill" id="presProgressFill"></div>
            <div class="presentation-progress-ticks" id="presProgressTicks"></div>
          </div>
          <div class="presentation-panel-footer">
            <div class="presentation-panel-controls" role="group" aria-label="Workout transport">
              <button type="button" class="pres-icon-btn" id="presBtnSkipStart" title="Start of this rep — or previous rep if within 1 s of rep start" aria-label="Start of this rep, or previous rep if within one second of rep start">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polygon points="19 20 9 12 19 4 19 20" />
                  <line x1="5" x2="5" y1="19" y2="5" />
                </svg>
              </button>
              <button type="button" class="pres-icon-btn" id="presBtnRewind" title="Rewind (hold)" aria-label="Rewind while held">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polygon points="11 19 2 12 11 5 11 19" />
                  <polygon points="22 19 13 12 22 5 22 19" />
                </svg>
              </button>
              <button type="button" class="pres-icon-btn" id="presBtnPlayPause" aria-label="Play workout" title="Play">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polygon points="6 3 20 12 6 21 6 3" />
                </svg>
              </button>
              <button type="button" class="pres-icon-btn" id="presBtnFastForward" title="Fast forward (hold)" aria-label="Fast forward while held">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polygon points="13 19 22 12 13 5 13 19" />
                  <polygon points="2 19 11 12 2 5 2 19" />
                </svg>
              </button>
              <button type="button" class="pres-icon-btn" id="presBtnSkipEnd" title="Start of next rep — or end of this rep on the last rep" aria-label="Start of next rep, or end of this rep when on the last rep of the workout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polygon points="5 4 15 12 5 20 5 4" />
                  <line x1="19" x2="19" y1="5" y2="19" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/workoutPresentation.js"></script>
  <script src="js/presentationShared.js"></script>
  <script src="js/workoutPlaybackEngine.js"></script>
  <script src="js/playerTtsVoices.js"></script>
  <script src="js/playerPlaybackAudio.js"></script>
  <script src="js/playerApp.js"></script>
</body>
</html>
